services:
  neo4j:
    image: neo4j:5.26-community
    container_name: agent-space-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-agent-space-password}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/import:/import
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u neo4j -p '${NEO4J_PASSWORD:-agent-space-password}' 'RETURN 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
