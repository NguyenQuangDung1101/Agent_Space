<!doctype html>
<html lang="en">
<head>
  <link rel="icon" href="data:,">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Space</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      background: #0b1020;
      color: #e8ecf4;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #0b1020; }

    header {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      border-bottom: 1px solid #26304a;
      background: #11182b;
    }

    header h1 { margin: 0; font-size: 19px; }
    .status-line { display: flex; align-items: center; gap: 9px; color: #aab4ca; font-size: 13px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #718096; }
    .dot.running { background: #f6c453; }
    .dot.waiting { background: #63b3ed; }
    .dot.completed { background: #44d19d; }
    .dot.failed { background: #ff6b7a; }

    main {
      height: calc(100vh - 64px);
      display: grid;
      grid-template-columns: 250px minmax(0, 1.55fr) minmax(310px, .9fr);
    }

    nav, aside { overflow-y: auto; background: #0e1527; }
    nav { border-right: 1px solid #26304a; padding: 14px; }
    aside { border-left: 1px solid #26304a; padding: 16px; }

    .nav-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
    .nav-head strong { font-size: 14px; }
    button {
      border: 0;
      border-radius: 10px;
      background: #4b72e8;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { cursor: not-allowed; opacity: .55; }
    #newConversation { width: 34px; height: 34px; font-size: 20px; }

    .conversation {
      width: 100%;
      margin-bottom: 7px;
      padding: 10px;
      text-align: left;
      background: transparent;
      border: 1px solid transparent;
      color: #dce3f3;
    }
    .conversation:hover { background: #151f35; }
    .conversation.active { background: #1b2947; border-color: #365387; }
    .conversation-title { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .conversation-time { display: block; margin-top: 4px; color: #8290aa; font-size: 11px; font-weight: 400; }

    .chat-panel { min-width: 0; display: flex; flex-direction: column; }
    #messages { flex: 1; overflow-y: auto; padding: 24px; }
    .chat-empty-state {
      height: 100%;
      min-height: 220px;
      display: grid;
      place-content: center;
      gap: 7px;
      text-align: center;
      color: #8f9bb3;
    }
    .chat-empty-state strong { color: #cbd4e6; font-size: 15px; }
    .chat-empty-state span { font-size: 13px; }
    .message { max-width: 820px; margin: 0 auto 18px; display: flex; flex-direction: column; gap: 6px; }
    .message.user { align-items: flex-end; }
    .label { color: #8894ad; font-size: 12px; }
    .bubble {
      max-width: 86%;
      padding: 13px 15px;
      border: 1px solid #293653;
      border-radius: 14px;
      background: #18223a;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .message.user .bubble { background: #2957d4; border-color: #3967df; }

    form {
      display: flex;
      gap: 12px;
      padding: 16px 20px 20px;
      border-top: 1px solid #26304a;
      background: #11182b;
    }
    textarea {
      flex: 1;
      min-height: 52px;
      max-height: 160px;
      resize: vertical;
      border: 1px solid #34415f;
      border-radius: 12px;
      padding: 13px 14px;
      background: #0e1527;
      color: #eef2fa;
      font: inherit;
      outline: none;
    }
    textarea:focus { border-color: #5f83ef; }
    #sendButton { align-self: flex-end; height: 46px; padding: 0 20px; }

    .card {
      margin-bottom: 14px;
      padding: 14px;
      border: 1px solid #283551;
      border-radius: 13px;
      background: #131c31;
    }
    .card h2 { margin: 0 0 11px; font-size: 14px; }
    .meta-grid { display: grid; grid-template-columns: 88px minmax(0, 1fr); gap: 8px; font-size: 13px; }
    .key { color: #8390aa; }
    .value { overflow-wrap: anywhere; }
    .member { margin-top: 9px; padding: 10px; border: 1px solid #25314b; border-radius: 10px; background: #0e1628; }
    .member strong { display: block; margin-bottom: 5px; color: #dce6ff; font-size: 13px; }
    .small { color: #a8b2c7; font-size: 12px; line-height: 1.45; white-space: pre-wrap; }
    .tool { display: inline-block; margin: 5px 4px 0 0; padding: 3px 7px; border-radius: 999px; background: #263657; color: #cbd7f0; font-size: 11px; }
    #events { max-height: 42vh; overflow-y: auto; }
    .event { padding: 9px 0; border-bottom: 1px solid #25314b; font-size: 12px; }
    .event:last-child { border-bottom: 0; }
    .event-title { display: flex; justify-content: space-between; gap: 10px; color: #d4dded; }
    .event-time, .empty { color: #74819a; font-size: 12px; }
    .event-detail { margin-top: 4px; color: #93a0b9; }

    @media (max-width: 1050px) {
      main { grid-template-columns: 210px minmax(0, 1fr); }
      aside { grid-column: 1 / -1; border-left: 0; border-top: 1px solid #26304a; }
    }
    @media (max-width: 700px) {
      main { height: auto; min-height: calc(100vh - 64px); grid-template-columns: 1fr; }
      nav { max-height: 220px; border-right: 0; border-bottom: 1px solid #26304a; }
      .chat-panel { min-height: 68vh; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Agent Space</h1>
    <div class="status-line">
      <span id="statusDot" class="dot"></span>
      <span id="statusText">Idle</span>
    </div>
  </header>

  <main>
    <nav>
      <div class="nav-head">
        <strong>Conversations</strong>
        <button id="newConversation" title="New conversation">+</button>
      </div>
      <div id="conversationList" class="empty">No conversations.</div>
    </nav>

    <section class="chat-panel">
      <div id="messages"></div>
      <form id="taskForm">
        <textarea id="taskInput" placeholder="Describe your task..." required></textarea>
        <button id="sendButton" type="submit">Send</button>
      </form>
    </section>

    <aside>
      <section class="card">
        <h2>Execution</h2>
        <div class="meta-grid">
          <span class="key">Conversation</span><span id="conversationId" class="value">—</span>
          <span class="key">Session</span><span id="sessionId" class="value">—</span>
          <span class="key">Mode</span><span id="mode" class="value">—</span>
          <span class="key">Active</span><span id="activeAgent" class="value">—</span>
        </div>
      </section>
      <section class="card">
        <h2>Plan</h2>
        <div id="plan" class="empty">No plan yet.</div>
      </section>
      <section class="card">
        <h2>Execution events</h2>
        <div id="events" class="empty">No events yet.</div>
      </section>
    </aside>
  </main>

  <script>
    const eventNames = [
      "message_received", "session_started", "analysis_started",
      "analysis_completed", "planning_started", "planning_completed",
      "agent_running", "agent_completed", "agent_failed", "tool_running",
      "tool_completed", "tool_failed", "supervisor_selected_task",
      "user_contact_requested", "session_paused", "user_contact_answered",
      "session_resumed", "synthesis_started", "synthesis_completed",
      "synthesis_failed", "execution_failed", "session_completed",
      "session_failed"
    ];

    const labels = {
      message_received: "Message received",
      session_started: "Session started",
      analysis_started: "Analyzing task",
      analysis_completed: "Analysis completed",
      planning_started: "Creating plan",
      planning_completed: "Plan completed",
      agent_running: "Agent running",
      agent_completed: "Agent completed",
      agent_failed: "Agent failed",
      tool_running: "Tool running",
      tool_completed: "Tool completed",
      tool_failed: "Tool failed",
      supervisor_selected_task: "Supervisor selected task",
      user_contact_requested: "User contact requested",
      session_paused: "Session paused",
      user_contact_answered: "User response received",
      session_resumed: "Session resumed",
      synthesis_started: "Synthesizing response",
      synthesis_completed: "Synthesis completed",
      synthesis_failed: "Synthesis failed",
      execution_failed: "Execution failed",
      session_completed: "Session completed",
      session_failed: "Session failed"
    };

    const $ = id => document.getElementById(id);
    const form = $("taskForm");
    const input = $("taskInput");
    const sendButton = $("sendButton");
    const messagesBox = $("messages");
    const conversationList = $("conversationList");
    const eventsBox = $("events");
    const planBox = $("plan");
    const conversationIdBox = $("conversationId");
    const sessionIdBox = $("sessionId");
    const modeBox = $("mode");
    const activeAgentBox = $("activeAgent");
    const statusText = $("statusText");
    const statusDot = $("statusDot");

    let source = null;
    let conversations = [];
    let currentConversationId = null;
    let currentSessionId = null;
    let awaitingUser = false;
    let seenEvents = new Set();
    let seenContacts = new Set();

    async function api(url, options = {}) {
      const response = await fetch(url, options);
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.detail || `Request failed: ${response.status}`);
      return data;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setStatus(text, state = "running") {
      statusText.textContent = text;
      statusDot.className = `dot ${state}`;
    }

    function setBusy(busy) {
      input.disabled = busy || !currentConversationId;
      sendButton.disabled = busy || !currentConversationId;
      input.placeholder = awaitingUser
        ? "Reply to the agent..."
        : "Describe your task...";
    }

    function addMessage(role, text, label = null) {
      const item = document.createElement("div");
      item.className = `message ${role}`;
      item.innerHTML = `
        <span class="label">${escapeHtml(label || (role === "user" ? "You" : "Agent Space"))}</span>
        <div class="bubble">${escapeHtml(text)}</div>`;
      messagesBox.appendChild(item);
      messagesBox.scrollTop = messagesBox.scrollHeight;
    }

    function showChatEmpty(title, detail = "") {
      messagesBox.innerHTML = `<div class="chat-empty-state">
        <strong>${escapeHtml(title)}</strong>
        ${detail ? `<span>${escapeHtml(detail)}</span>` : ""}
      </div>`;
    }

    function formatDate(value) {
      return value ? new Date(value).toLocaleString() : "";
    }

    function renderConversationList() {
      if (!conversations.length) {
        conversationList.className = "empty";
        conversationList.textContent = "No conversations.";
        return;
      }
      conversationList.className = "";
      conversationList.innerHTML = conversations.map(item => `
        <button class="conversation ${item.conversation_id === currentConversationId ? "active" : ""}"
                data-id="${escapeHtml(item.conversation_id)}">
          <span class="conversation-title">${escapeHtml(item.title || "New conversation")}</span>
          <span class="conversation-time">${escapeHtml(formatDate(item.updated_at))}</span>
        </button>`).join("");
    }

    async function refreshConversations() {
      conversations = await api("/conversations");
      renderConversationList();
    }

    function resetSessionView() {
      source?.close();
      source = null;
      currentSessionId = null;
      awaitingUser = false;
      seenEvents = new Set();
      sessionIdBox.textContent = "—";
      modeBox.textContent = "—";
      activeAgentBox.textContent = "—";
      planBox.className = "empty";
      planBox.textContent = "No plan yet.";
      eventsBox.className = "empty";
      eventsBox.textContent = "No events yet.";
    }

    function toolsHtml(toolIds = []) {
      return toolIds.length
        ? toolIds.map(id => `<span class="tool">${escapeHtml(id)}</span>`).join("")
        : '<span class="small">No shared tools</span>';
    }

    function renderPlan(session) {
      if (session.single_plan) {
        const plan = session.single_plan;
        modeBox.textContent = "Single";
        planBox.className = "";
        planBox.innerHTML = `<div class="member">
          <strong>${escapeHtml(plan.agent_id)}</strong>
          <div class="small">${escapeHtml(plan.task)}</div>
          <div>${toolsHtml(plan.assigned_tool_ids)}</div>
        </div>`;
        return;
      }
      if (session.team_plan) {
        const plan = session.team_plan;
        modeBox.textContent = `Team · ${plan.orchestration}`;
        planBox.className = "";
        planBox.innerHTML = plan.members.map(member => `<div class="member">
          <strong>${escapeHtml(member.instance_id)} · ${escapeHtml(member.agent_id)}</strong>
          <div class="small">Role: ${escapeHtml(member.role)}</div>
          <div class="small">${escapeHtml(member.task)}</div>
          <div>${toolsHtml(member.assigned_tool_ids)}</div>
        </div>`).join("");
        return;
      }
      modeBox.textContent = session.execution_mode || "—";
    }

    function eventKey(event) {
      return [event.event_type, event.timestamp, event.agent_id, event.instance_id,
        event.task_id, event.details?.contact_id, event.details?.tool_name].join("|");
    }

    function eventDetail(event) {
      const details = event.details || {};
      const parts = [];
      if (event.agent_id) parts.push(`agent: ${event.agent_id}`);
      if (event.task_id) parts.push(`task: ${event.task_id}`);
      if (details.tool_name) parts.push(`tool: ${details.tool_name}`);
      if (details.error) parts.push(`error: ${details.error}`);
      return parts.join(" · ");
    }

    function appendEvent(event) {
      const key = eventKey(event);
      if (seenEvents.has(key)) return false;
      seenEvents.add(key);
      if (eventsBox.classList.contains("empty")) {
        eventsBox.className = "";
        eventsBox.innerHTML = "";
      }
      const item = document.createElement("div");
      item.className = "event";
      const detail = eventDetail(event);
      item.innerHTML = `<div class="event-title">
          <span>${escapeHtml(labels[event.event_type] || event.event_type)}</span>
          <span class="event-time">${escapeHtml(event.timestamp ? new Date(event.timestamp).toLocaleTimeString() : "")}</span>
        </div>${detail ? `<div class="event-detail">${escapeHtml(detail)}</div>` : ""}`;
      eventsBox.appendChild(item);
      eventsBox.scrollTop = eventsBox.scrollHeight;
      return true;
    }

    async function loadConversationHistory() {
      const [history, contacts] = await Promise.all([
        api(`/conversations/${currentConversationId}/messages`),
        api(`/conversations/${currentConversationId}/contacts`)
      ]);
      seenContacts = new Set(contacts.map(item => item.contact_id));
      const entries = [
        ...history.map(item => ({
          at: item.created_at, role: item.role, text: item.content,
          label: item.role === "user" ? "You" : "Agent Space"
        })),
        ...contacts.map(item => ({
          at: item.created_at, role: "assistant", text: item.question,
          label: item.agent_name || item.agent_id
        }))
      ].sort((a, b) => new Date(a.at) - new Date(b.at));

      messagesBox.innerHTML = "";
      if (!entries.length) {
        showChatEmpty("No messages yet", "Use the input below to start this conversation.");
        return;
      }
      entries.forEach(item => addMessage(item.role, item.text, item.label));
    }

    async function loadEventHistory(sessionId) {
      seenEvents = new Set();
      eventsBox.className = "empty";
      eventsBox.textContent = "No events yet.";
      const events = await api(`/sessions/${sessionId}/events/history`);
      events.forEach(appendEvent);
      const active = [...events].reverse().find(item => item.agent_id);
      activeAgentBox.textContent = active?.agent_id || "—";
    }

    function connectEvents(sessionId) {
      source?.close();
      source = new EventSource(`/sessions/${sessionId}/events`);
      eventNames.forEach(name => source.addEventListener(name, message => {
        try { handleEvent(JSON.parse(message.data)); }
        catch (error) { console.error("Invalid event", error); }
      }));
      source.onerror = () => {
        if (!awaitingUser) setStatus("Reconnecting", "running");
      };
    }

    function applySessionState(session) {
      renderPlan(session);
      sessionIdBox.textContent = session.session_id;
      currentSessionId = session.session_id;

      if (session.status === "WAITING_FOR_USER") {
        awaitingUser = true;
        const contact = session.final_result?.pending_contact;
        activeAgentBox.textContent = contact?.agent_id || activeAgentBox.textContent;
        setStatus("Paused · waiting for reply", "waiting");
        setBusy(false);
        connectEvents(session.session_id);
      } else if (session.status === "RUNNING" || session.status === "PENDING") {
        awaitingUser = false;
        setStatus("Running", "running");
        setBusy(true);
        connectEvents(session.session_id);
      } else if (session.status === "COMPLETED") {
        awaitingUser = false;
        activeAgentBox.textContent = "—";
        setStatus("Completed", "completed");
        setBusy(false);
      } else {
        awaitingUser = false;
        activeAgentBox.textContent = "—";
        setStatus("Failed", "failed");
        setBusy(false);
      }
    }

    async function loadLatestSession() {
      const sessions = await api(`/conversations/${currentConversationId}/sessions`);
      if (!sessions.length) {
        setStatus("Idle", "");
        setBusy(false);
        return;
      }
      const session = sessions[sessions.length - 1];
      await loadEventHistory(session.session_id);
      applySessionState(session);
    }

    async function selectConversation(conversationId) {
      if (conversationId === currentConversationId && currentSessionId) return;
      resetSessionView();
      currentConversationId = conversationId;
      localStorage.setItem("agent_space_conversation_id", conversationId);
      conversationIdBox.textContent = conversationId;
      renderConversationList();
      setBusy(true);
      await loadConversationHistory();
      await loadLatestSession();
    }

    async function createConversation() {
      const conversation = await api("/conversations", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: "{}"
      });
      await refreshConversations();
      await selectConversation(conversation.conversation_id);
      input.focus();
    }

    async function handleEvent(event) {
      if (!appendEvent(event)) return;
      const details = event.details || {};
      if (event.agent_id) activeAgentBox.textContent = event.agent_id;

      switch (event.event_type) {
        case "session_started": setStatus("Running", "running"); break;
        case "analysis_started": setStatus("Analyzing", "running"); break;
        case "analysis_completed":
          modeBox.textContent = details.execution_mode || modeBox.textContent;
          setStatus("Analysis completed", "running");
          break;
        case "planning_started": setStatus("Planning", "running"); break;
        case "planning_completed":
          setStatus("Plan ready", "running");
          renderPlan(await api(`/sessions/${currentSessionId}`));
          break;
        case "agent_running": setStatus(`${event.agent_id || "Agent"} running`, "running"); break;
        case "tool_running": setStatus(`Using ${details.tool_name || "tool"}`, "running"); break;
        case "user_contact_requested":
          awaitingUser = true;
          if (!seenContacts.has(details.contact_id)) {
            seenContacts.add(details.contact_id);
            addMessage("assistant", details.question || "The agent needs more information.",
              details.agent_name || event.agent_id || "Agent");
          }
          setStatus("Paused · waiting for reply", "waiting");
          setBusy(false);
          input.focus();
          break;
        case "session_paused":
          awaitingUser = true;
          setStatus("Paused · waiting for reply", "waiting");
          setBusy(false);
          break;
        case "user_contact_answered":
          awaitingUser = false;
          setStatus("Reply received", "running");
          setBusy(true);
          break;
        case "session_resumed":
          awaitingUser = false;
          setStatus("Resumed · running", "running");
          setBusy(true);
          break;
        case "synthesis_started": setStatus("Synthesizing", "running"); break;
        case "session_completed":
          source?.close();
          awaitingUser = false;
          activeAgentBox.textContent = "—";
          setStatus("Completed", "completed");
          setBusy(false);
          await loadConversationHistory();
          await refreshConversations();
          break;
        case "session_failed":
          source?.close();
          awaitingUser = false;
          activeAgentBox.textContent = "—";
          setStatus("Failed", "failed");
          setBusy(false);
          await loadConversationHistory();
          await refreshConversations();
          break;
      }
    }

    conversationList.addEventListener("click", event => {
      const button = event.target.closest("[data-id]");
      if (button) selectConversation(button.dataset.id).catch(showError);
    });

    $("newConversation").addEventListener("click", () => {
      createConversation().catch(showError);
    });

    form.addEventListener("submit", async event => {
      event.preventDefault();
      const content = input.value.trim();
      if (!content || !currentConversationId) return;

      const replying = awaitingUser;
      if (!replying) {
        resetSessionView();
        conversationIdBox.textContent = currentConversationId;
        setStatus("Starting", "running");
      }
      addMessage("user", content);
      input.value = "";
      setBusy(true);

      try {
        const data = await api(`/conversations/${currentConversationId}/messages`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content })
        });
        currentSessionId = data.session_id;
        sessionIdBox.textContent = data.session_id;
        awaitingUser = false;
        setStatus(data.resumed ? "Resuming" : "Starting", "running");
        connectEvents(data.session_id);
        await refreshConversations();
      } catch (error) {
        await loadConversationHistory();
        showError(error);
      }
    });

    input.addEventListener("keydown", event => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
      }
    });

    function showError(error) {
      setStatus("Failed", "failed");
      addMessage("assistant", `Request failed: ${error.message}`);
      setBusy(false);
    }

    async function initialize() {
      try {
        await refreshConversations();
        resetSessionView();
        currentConversationId = null;
        conversationIdBox.textContent = "—";
        renderConversationList();
        showChatEmpty("No conversation selected", "Create a conversation or choose one from the list.");
        setStatus("Idle", "");
        setBusy(false);
      } catch (error) {
        showError(error);
      }
    }

    initialize();
  </script>
</body>
</html>
